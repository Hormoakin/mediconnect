# ══════════════════════════════════════════════════════════════
# .github/workflows/deploy-k8s.yaml
# Workflow 2: Deploy to Kubernetes after successful build.
# Triggered by successful completion of build-and-push workflow.
# ══════════════════════════════════════════════════════════════
name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build and Push Backend Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to K8s (mediconnect namespace)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Update image tags in manifests
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          sed -i "s|hormoakin001/mediconnect-backend:latest|hormoakin001/mediconnect-backend:${SHA}|g" k8s/base/backend.yaml
          sed -i "s|hormoakin001/mediconnect-websocket:latest|hormoakin001/mediconnect-websocket:${SHA}|g" k8s/base/websocket.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/storageclass.yaml
          kubectl apply -f k8s/base/configmap.yaml
          kubectl apply -f k8s/base/postgres.yaml
          kubectl apply -f k8s/base/redis.yaml
          kubectl apply -f k8s/base/backend.yaml
          kubectl apply -f k8s/base/websocket.yaml
          kubectl apply -f k8s/base/frontend.yaml
          kubectl apply -f k8s/base/ingress.yaml
          kubectl apply -f k8s/base/hpa.yaml

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend -n mediconnect --timeout=300s

      - name: Smoke test — health endpoint
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.mediconnect.salman-aak.com/api/v1/health/)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed: $STATUS"

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment successful — MediConnect is live at https://mediconnect.salman-aak.com"
---
