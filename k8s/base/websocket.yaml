apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  namespace: mediconnect
  labels:
    app: websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
        - name: websocket
          image: hormoakin001/mediconnect-websocket:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: CORS_ORIGIN
              value: "https://mediconnect.salman-aak.com"
            - name: REDIS_URL
              value: "redis://redis-service:6379/3"
            - name: DATABASE_HOST
              value: "postgres-service"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "mediconnect"
            - name: DATABASE_USER
              value: "mediconnect_user"
            - name: BACKEND_INTERNAL_URL
              value: "http://backend-service:8000"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-db-credentials
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mediconnect-app-secrets
                  key: SECRET_KEY
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mediconnect-app-secrets
                  key: INTERNAL_SERVICE_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "150m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: mediconnect
spec:
  selector:
    app: websocket
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
