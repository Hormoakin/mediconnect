# ══════════════════════════════════════════════════════════════
# k8s/base/backend.yaml
# Django REST Framework backend — 2 replicas for HA.
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mediconnect
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hormoakin001/mediconnect-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mediconnect-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-db-credentials
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-app-secrets
                  key: SECRET_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: TWILIO_PHONE_NUMBER
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: SENDGRID_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: OPENAI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mediconnect-aws-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-aws-secrets
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mediconnect
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
# ══════════════════════════════════════════════════════════════
# Celery Worker Deployment
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: hormoakin001/mediconnect-backend:latest
          command: ["celery", "-A", "mediconnect", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: mediconnect-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-db-credentials
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-app-secrets
                  key: SECRET_KEY
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: SENDGRID_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-api-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
---
# Celery Beat Scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: mediconnect
spec:
  replicas: 1   # MUST be 1 — only one beat scheduler allowed
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: hormoakin001/mediconnect-backend:latest
          command: ["celery", "-A", "mediconnect", "beat", "--loglevel=info",
                    "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
          envFrom:
            - configMapRef:
                name: mediconnect-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-db-credentials
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mediconnect-app-secrets
                  key: SECRET_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
