# ══════════════════════════════════════════════════════════════
# k8s/monitoring/prometheus-config.yaml
# Prometheus scrape configuration — four target categories.
# NFR-13: scrape every 15 seconds.
# NFR-14: alert response < 5 minutes (via Alertmanager rules).
# ══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      scrape_timeout:      10s
      external_labels:
        cluster: mediconnect-production
        region:  eu-north-1

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # ── 1. MediConnect Backend API (/metrics via django-prometheus) ──
      - job_name: 'mediconnect-backend'
        static_configs:
          - targets: ['backend-service.mediconnect.svc.cluster.local:8000']
        metrics_path: /metrics
        scrape_interval: 15s

      # ── 2. Kubernetes nodes (via node_exporter installed by Ansible) ──
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # ── 3. cAdvisor — container resource usage ───────────────────────
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # ── 4. PostgreSQL via postgres_exporter ─────────────────────────
      - job_name: 'postgresql'
        static_configs:
          - targets: ['postgres-exporter-service.mediconnect.svc.cluster.local:9187']
        scrape_interval: 30s

      # ── 5. Redis via redis_exporter ──────────────────────────────────
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter-service.mediconnect.svc.cluster.local:9121']
        scrape_interval: 30s

      # ── 6. NGINX Ingress metrics ─────────────────────────────────────
      - job_name: 'nginx-ingress'
        static_configs:
          - targets: ['ingress-nginx-controller-metrics.ingress-nginx.svc.cluster.local:10254']

      # ── 7. Node_exporter direct (installed via Ansible role) ─────────
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.*):10250'
            replacement: '${1}:9100'
            target_label: __address__

  # ── Alerting rules ──────────────────────────────────────────
  alert_rules.yml: |
    groups:
      - name: mediconnect.api
        rules:
          - alert: HighAPIErrorRate
            expr: |
              (
                sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m]))
                /
                sum(rate(django_http_responses_total_by_status_view_method_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High API error rate (>5%)"
              description: "HTTP 5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

          - alert: SlowAPIResponse
            expr: |
              histogram_quantile(0.95,
                sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[10m])) by (le)
              ) > 0.5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Slow API response (p95 > 500ms)"
              description: "p95 latency is {{ $value | humanizeDuration }} — NFR-01 threshold exceeded."

      - name: mediconnect.infrastructure
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="mediconnect"}[10m]) * 600 > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} crash-looping"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last 10 minutes."

          - alert: HighNodeCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on node {{ $labels.instance }}"
              description: "Node CPU usage is {{ $value }}% — above 85% for 15 minutes."

          - alert: HighNodeMemory
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory on node {{ $labels.instance }}"
              description: "Node memory usage is {{ $value }}% — above 85% for 10 minutes."

          - alert: DiskSpaceLow
            expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Low disk space on {{ $labels.instance }}"
              description: "Disk usage is {{ $value }}% on {{ $labels.mountpoint }}."

      - name: mediconnect.database
        rules:
          - alert: PostgresConnectionsHigh
            expr: sum(pg_stat_activity_count) > 80
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL connection count high"
              description: "{{ $value }} active connections — approaching max_connections limit."

          - alert: RedisMemoryHigh
            expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Redis memory usage high"
              description: "Redis is using {{ $value }}% of configured maxmemory."

      - name: mediconnect.certificates
        rules:
          - alert: SSLCertificateExpiringSoon
            expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "SSL certificate expiring in < 14 days"
              description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}."
---
