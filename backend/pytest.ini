# ══════════════════════════════════════════════════════════════
# backend/pytest.ini
# ══════════════════════════════════════════════════════════════
[pytest]
DJANGO_SETTINGS_MODULE = mediconnect.settings.testing
python_files  = tests.py test_*.py *_tests.py
python_classes= Test*
python_functions= test_*
addopts =
    --tb=short
    --cov=apps
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=70
    -v
testpaths = apps
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
