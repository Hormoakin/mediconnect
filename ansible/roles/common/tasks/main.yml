# ══════════════════════════════════════════════════════════════
# ansible/roles/common/tasks/main.yml
# ══════════════════════════════════════════════════════════════
---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages to latest versions
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  register: apt_upgrade

- name: Print upgrade summary
  debug:
    msg: "Packages changed: {{ apt_upgrade.stdout_lines | default([]) | length }}"

- name: Install essential system packages
  apt:
    name:
      - curl
      - wget
      - vim
      - git
      - htop
      - net-tools
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - chrony           # NTP for accurate timestamps (JWT validation, audit logs)
      - logrotate        # Log file management
      - unattended-upgrades  # Automatic security patches
    state: present

# ── NTP / Time synchronisation ─────────────────────────────────
# Accurate system time is critical for:
#  - JWT token expiry validation (NFR-08: 24h expiry)
#  - Audit log timestamps (FR-03.5)
#  - Prometheus metric collection intervals (NFR-13: every 15s)
- name: Configure chrony to use AWS NTP server
  copy:
    content: |
      server 169.254.169.123 prefer iburst
      makestep 1.0 3
      rtcsync
      driftfile /var/lib/chrony/chrony.drift
      logdir /var/log/chrony
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony

- name: Enable and start chrony
  systemd:
    name: chronyd
    enabled: yes
    state: started

- name: Verify time synchronisation
  command: chronyc tracking
  register: chrony_status
  changed_when: false

- name: Print NTP tracking status
  debug:
    var: chrony_status.stdout_lines

# ── Log rotation ───────────────────────────────────────────────
- name: Configure container log rotation (7-day retention)
  copy:
    content: |
      /var/log/containers/*.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 root adm
      }
    dest: /etc/logrotate.d/containers
    owner: root
    group: root
    mode: '0644'

# ── Unattended security upgrades ──────────────────────────────
- name: Enable unattended-upgrades for security patches
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'

- name: Enable automatic unattended-upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'

  # ── Handlers ─────────────────────────────────────────────────
handlers:
  - name: Restart chrony
    systemd:
      name: chronyd
      state: restarted

