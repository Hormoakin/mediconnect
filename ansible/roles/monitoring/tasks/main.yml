# ══════════════════════════════════════════════════════════════
# ansible/roles/monitoring/tasks/main.yml
#
# Installs Prometheus node_exporter on every cluster node so
# Prometheus can scrape infrastructure metrics (CPU, RAM, disk,
# network) via the 'kubernetes-nodes' scrape job defined in the
# Prometheus ConfigMap (k8s/monitoring/prometheus-config.yaml).
# Implements NFR-13: metrics collection every 15 seconds.
# ══════════════════════════════════════════════════════════════
---
- name: Create node_exporter system user (no login shell, no home)
  user:
    name: node_exporter
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Download node_exporter binary
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: '0644'
    checksum: "sha256:fbadb376afa7c883f87f70795700a8a200f7fd45412532cc1938a24d41078011"

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install node_exporter binary
  copy:
    src: /tmp/node_exporter-1.8.1.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: yes
  notify: Restart node_exporter

- name: Create node_exporter systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      Documentation=https://prometheus.io/docs/guides/node-exporter/
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --collector.filesystem.mount-points-exclude="^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)" \
        --collector.netclass.ignored-devices="^(veth|docker|br-|cni).*$" \
        --web.listen-address=":9100" \
        --web.telemetry-path="/metrics"
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd and restart node_exporter

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

- name: Allow Prometheus scraping on port 9100 (UFW)
  ufw:
    rule: allow
    port: '9100'
    proto: tcp
    src: '10.0.0.0/8'
    comment: 'Prometheus node_exporter scraping from within VPC'

- name: Verify node_exporter is responding
  uri:
    url: "http://localhost:9100/metrics"
    return_content: no
    status_code: 200
  retries: 3
  delay: 5

- name: Clean up downloaded files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - /tmp/node_exporter-1.8.1.linux-amd64

handlers:
  - name: Restart node_exporter
    systemd:
      name: node_exporter
      state: restarted

  - name: Reload systemd and restart node_exporter
    systemd:
      name: node_exporter
      state: restarted
      daemon_reload: yes

